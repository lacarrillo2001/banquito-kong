version: "3.9"

services:
  kong-db:
    image: postgres:16
    container_name: kong-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KONG_PG_DATABASE}
      POSTGRES_USER: ${KONG_PG_USER}
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD}
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    networks:
      - banquito-net

  kong-migrations:
    image: kong:3.7
    container_name: kong-migrations
    depends_on:
      - kong-db
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
    command: kong migrations bootstrap
    restart: "no"
    networks:
      - banquito-net

  kong:
    image: kong:3.7
    container_name: banquito-kong
    restart: unless-stopped
    depends_on:
      - kong-db
      - kong-migrations
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    networks:
      - banquito-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  konga-db:
    image: postgres:11
    container_name: konga-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: konga
      POSTGRES_USER: konga
      POSTGRES_PASSWORD: konga123
      POSTGRES_INITDB_ARGS: "--auth=md5"
    volumes:
      - konga_db_data:/var/lib/postgresql/data
    networks:
      - banquito-net

  konga:
    image: pantsel/konga:0.14.9
    container_name: banquito-konga
    restart: unless-stopped
    depends_on:
      - konga-db
      - kong
    environment:
      DB_ADAPTER: postgres
      DB_HOST: konga-db
      DB_PORT: 5432
      DB_USER: konga
      DB_PASSWORD: konga123
      DB_DATABASE: konga
      NODE_ENV: development
    ports:
      - "1337:1337"
    networks:
      - banquito-net

  kong-sync:
    image: kong/deck:latest
    container_name: banquito-kong-sync
    restart: "no"
    command: gateway sync /kong/kong.yml --kong-addr http://kong:8001
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
    networks:
      - banquito-net
    depends_on:
      kong:
        condition: service_healthy

volumes:
  kong_db_data:
  konga_db_data:

networks:
  banquito-net:
    external: true