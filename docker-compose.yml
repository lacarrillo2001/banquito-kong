name: banquito-kong-private-vm

services:
  kong-database:
    image: postgres:15-alpine
    container_name: banquito-kong-postgres
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Guayaquil}
      POSTGRES_DB: ${KONG_PG_DATABASE}
      POSTGRES_USER: ${KONG_PG_USER}
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD}
    volumes:
      - kong_postgres_data:/var/lib/postgresql/data
    networks:
      - kong-infra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  kong-migrations:
    image: kong:3.9
    container_name: banquito-kong-migrations
    restart: "no"
    command: sh -c "kong migrations bootstrap || (kong migrations up && kong migrations finish)"
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - kong-infra

  kong-gateway:
    image: kong:3.9
    container_name: banquito-kong-gateway
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Guayaquil}
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_STATUS_LISTEN: 0.0.0.0:8100
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: ${KONG_LOG_LEVEL:-notice}
    ports:
      - "8000:8000"
      - "8010:8000"
      - "127.0.0.1:8001:8001"
      - "127.0.0.1:8100:8100"
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    networks:
      - kong-infra
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  deck-sync:
    image: kong/deck:v1.62.1
    container_name: banquito-deck-sync
    restart: "no"
    depends_on:
      kong-gateway:
        condition: service_healthy
    network_mode: service:kong-gateway
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    command:
      - gateway
      - sync
      - /kong/kong.yml
      - --kong-addr
      - http://localhost:8001

networks:
  kong-infra:
    driver: bridge

volumes:
  kong_postgres_data: {}
