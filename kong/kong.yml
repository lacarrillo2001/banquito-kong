_format_version: "3.0"
_transform: true

services:
  - name: identity-access-service
    url: http://10.128.0.9:8081
    routes:
      - name: identity-auth-routes
        paths: [/api/v1/auth]
        strip_path: false
      - name: identity-iam-routes
        paths: [/api/v1/iam]
        strip_path: false
      - name: identity-onboarding-routes
        paths: [/api/v1/onboarding]
        strip_path: false

  - name: core-customer-service
    url: http://10.128.0.9:8082
    routes:
      - name: customer-routes
        paths: [/api/v1/customers]
        strip_path: false

  - name: core-admin-service
    url: http://10.128.0.9:8083
    routes:
      - name: admin-routes
        paths: [/api/v1/admin]
        strip_path: false

  - name: core-accounting-service
    url: http://10.128.0.9:8084
    routes:
      - name: accounting-routes
        paths: [/api/v1/accounting]
        strip_path: false

  - name: core-account-service
    url: http://10.128.0.9:8085
    routes:
      - name: p2p-beneficiary-validation-route
        paths:
          - /api/v1/accounts/transfers/p2p/beneficiary-validation
        methods:
          - POST
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 30
              policy: local
      - name: account-routes
        paths:
          - /api/v1/accounts
          - /api/v1/teller
          - /api/v1/switch-core
        strip_path: false

  - name: document-service
    url: http://10.128.0.9:8086
    routes:
      - name: document-routes
        paths: [/api/v1/documents]
        strip_path: false

  - name: notification-service
    url: http://10.128.0.9:8087
    routes:
      - name: notification-routes
        paths: [/api/v1/notifications]
        strip_path: false

  - name: switch-batch-service
    url: http://10.128.0.9:8016
    routes:
      - name: switch-batch-upload
        methods: [POST, OPTIONS]
        paths: [/api/v1/batches/upload]
        strip_path: false
      - name: switch-batch-history
        methods: [GET, OPTIONS]
        paths: [/api/v1/batches]
        strip_path: false
      - name: switch-batch-status
        methods: [GET, OPTIONS]
        paths:
          - ~/api/v1/batches/[^/]+$
        strip_path: false
      - name: switch-batch-state-history
        methods: [GET, OPTIONS]
        paths:
          - ~/api/v1/batches/[^/]+/state-history$
        strip_path: false
      - name: switch-batch-validation-errors
        methods: [GET, OPTIONS]
        paths:
          - ~/api/v1/batches/[^/]+/validation-errors$
        strip_path: false
      - name: switch-batch-lines
        methods: [GET, OPTIONS]
        paths:
          - ~/api/v1/batches/[^/]+/lines$
        strip_path: false

  - name: switch-reporting-service
    url: http://10.128.0.9:8019
    routes:
      - name: switch-reporting-summary
        methods: [GET, OPTIONS]
        paths:
          - ~/api/v1/batches/[^/]+/summary$
        strip_path: false
      - name: switch-reporting-novelties
        methods: [GET, OPTIONS]
        paths:
          - ~/api/v1/batches/[^/]+/reports/novelties$
        strip_path: false
      - name: switch-reporting-novelty-details
        methods: [GET, OPTIONS]
        paths:
          - ~/api/v1/batches/[^/]+/novelties/details$
        strip_path: false
      - name: switch-reporting-corporate-receipt
        methods: [GET, OPTIONS]
        paths:
          - ~/api/v1/batches/[^/]+/receipts/corporate$
        strip_path: false
      - name: switch-reporting-commission
        methods: [GET, OPTIONS]
        paths:
          - ~/api/v1/batches/[^/]+/commission$
        strip_path: false
      - name: switch-reporting-clearing-file
        methods: [GET, OPTIONS]
        paths:
          - ~/api/v1/batches/[^/]+/clearing-file$
        strip_path: false
      - name: switch-reporting-notifications
        methods: [GET, OPTIONS]
        paths:
          - ~/api/v1/batches/[^/]+/notifications$
        strip_path: false

plugins:
  - name: correlation-id
    config:
      header_name: X-Correlation-Id
      generator: uuid
      echo_downstream: true

  - name: prometheus

  - name: rate-limiting
    config:
      minute: 300
      policy: local

  - name: request-size-limiting
    config:
      allowed_payload_size: 10

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Correlation-Id
        - Idempotency-Key
      exposed_headers:
        - X-Correlation-Id
        - Idempotency-Replayed
      credentials: false
      max_age: 3600
