_format_version: "3.0"
_transform: true

services:
  - name: identity-access-service
    url: http://${IDENTITY_HOST}:${IDENTITY_PORT}
    routes:
      - name: identity-auth-routes
        paths: [/api/v1/auth]
        strip_path: false
      - name: identity-iam-routes
        paths: [/api/v1/iam]
        strip_path: false

  - name: core-customer-service
    url: http://${CUSTOMER_HOST}:${CUSTOMER_PORT}
    routes:
      - name: customer-routes
        paths: [/api/v1/customers]
        strip_path: false

  - name: core-admin-service
    url: http://${ADMIN_HOST}:${ADMIN_PORT}
    routes:
      - name: admin-routes
        paths: [/api/v1/admin]
        strip_path: false

  - name: core-accounting-service
    url: http://${ACCOUNTING_HOST}:${ACCOUNTING_PORT}
    routes:
      - name: accounting-routes
        paths: [/api/v1/accounting]
        strip_path: false

  - name: core-account-service
    url: http://${ACCOUNT_HOST}:${ACCOUNT_PORT}
    routes:
      - name: account-routes
        paths:
          - /api/v1/accounts
          - /api/v1/teller
          - /api/v1/switch-core
        strip_path: false

  - name: document-service
    url: http://${DOCUMENT_HOST}:${DOCUMENT_PORT}
    routes:
      - name: document-routes
        paths: [/api/v1/documents]
        strip_path: false

  - name: notification-service
    url: http://${NOTIFICATION_HOST}:${NOTIFICATION_PORT}
    routes:
      - name: notification-routes
        paths: [/api/v1/notifications]
        strip_path: false

plugins:
  - name: correlation-id
    config:
      header_name: X-Correlation-Id
      generator: uuid
      echo_downstream: true

  - name: prometheus

  - name: rate-limiting
    config:
      minute: 300
      policy: local

  - name: request-size-limiting
    config:
      allowed_payload_size: 10

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Correlation-Id
      exposed_headers:
        - X-Correlation-Id
      credentials: false
      max_age: 3600