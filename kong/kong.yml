_format_version: "3.0"
_transform: true

services:
  - name: identity-access-service
    url: http://identity-access-service:8081
    routes:
      - name: identity-auth-routes
        paths: [/api/v1/auth]
        strip_path: false
      - name: identity-iam-routes
        paths: [/api/v1/iam]
        strip_path: false

  - name: core-customer-service
    url: http://core-customer-service:8082
    routes:
      - name: customer-routes
        paths: [/api/v1/customers]
        strip_path: false

  - name: core-admin-service
    url: http://core-admin-service:8083
    routes:
      - name: admin-routes
        paths: [/api/v1/admin]
        strip_path: false

  - name: core-accounting-service
    url: http://core-accounting-service:8084
    routes:
      - name: accounting-routes
        paths: [/api/v1/accounting]
        strip_path: false

  - name: core-account-service
    url: http://core-account-service:8085
    routes:
      - name: account-routes
        paths:
          - /api/v1/accounts
          - /api/v1/teller
          - /api/v1/switch-core
        strip_path: false

  - name: document-service
    url: http://document-service:8086
    routes:
      - name: document-routes
        paths: [/api/v1/documents]
        strip_path: false

  - name: notification-service
    url: http://notification-service:8087
    routes:
      - name: notification-routes
        paths: [/api/v1/notifications]
        strip_path: false

plugins:
  - name: correlation-id
    config:
      header_name: X-Correlation-Id
      generator: uuid
      echo_downstream: true

  - name: prometheus

  - name: rate-limiting
    config:
      minute: 300
      policy: local

  - name: request-size-limiting
    config:
      allowed_payload_size: 10

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Correlation-Id
      exposed_headers:
        - X-Correlation-Id
      credentials: false
      max_age: 3600
